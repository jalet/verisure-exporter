name: Helm

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  HELM_REGISTRY: ghcr.io/jalet/helm-charts

jobs:
  publish-helm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: azure/setup-helm@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Helm chart
        run: helm package charts/verisure-exporter --version ${{ steps.version.outputs.version }}

      - name: Push Helm chart to OCI registry
        run: helm push verisure-exporter-${{ steps.version.outputs.version }}.tgz oci://${{ env.HELM_REGISTRY }}
