apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: verisure-exporter
  namespace: monitoring
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: verisure-exporter
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "9878"
              protocol: TCP
  egress:
    - toFQDNs:
        - matchName: "automation01.verisure.com"
        - matchName: "automation02.verisure.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
          rules:
            dns:
              - matchPattern: "*.verisure.com"
