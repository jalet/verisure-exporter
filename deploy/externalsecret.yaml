apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: verisure-exporter
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: verisure-exporter-credentials
    creationPolicy: Owner
  data:
    - secretKey: VERISURE_USERNAME
      remoteRef:
        key: secret/data/verisure
        property: username
    - secretKey: VERISURE_PASSWORD
      remoteRef:
        key: secret/data/verisure
        property: password
    - secretKey: VERISURE_GIID
      remoteRef:
        key: secret/data/verisure
        property: giid
